name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install pytest
      run: python -m pip install pytest
    - name: tests
      id: tests
      uses: classroom-resources/autograding-python-grader@v1
      with:
        timeout: 10
    - name: Run pytest (debug)
      if: always()
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pytest -q --junitxml=test-results.xml || true

    - name: Save autograder raw output
      if: always()
      run: |
        echo "${{ steps.tests.outputs.result }}" > autograder-output.txt || true
        echo "--- autograder output ---"
        cat autograder-output.txt || true

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: autograder-debug
        path: |
          test-results.xml
          autograder-output.txt
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      if: always()
      env:
        TESTS_RESULTS: "${{steps.tests.outputs.result}}"
      with:
        runners: tests
